# Beagle Node Configuration - Example
# Copy to node.yaml and edit for your deployment.

node_id: "seattle-north-01"
log_level: "INFO"
health_port: 8080

location:
  latitude_deg: 47.7112
  longitude_deg: -122.3312

# SDR mode: freq_hop | two_sdr | single_sdr | rspduo
# - freq_hop:   Single RTL-SDR alternates between sync and target frequencies
#               via librtlsdr-2freq. One continuous ADC clock, no inter-SDR
#               jitter. Preferred for single-dongle development.
# - two_sdr:    Separate SDRs for sync (FM) and target (LMR). Requires GPS
#               1PPS injection into both inputs for sample-domain alignment.
#               Supports UHF targets. Preferred for production.
# - single_sdr: One wideband SDR covering both bands simultaneously. Only
#               valid when both signals fit within its bandwidth (e.g., FM +
#               VHF LMR). Not suitable for FM + UHF LMR.
# - rspduo:     SDRplay RSPduo dual-tuner. Two independent tuners share one
#               24 MHz TCXO and ADC - no GPS 1PPS required. ~250 ns
#               inter-channel timing offset calibrated via pipeline_offset_ns.
sdr_mode: "freq_hop"

# --- freq_hop mode ---
freq_hop:
  # device_serial: "00000001"    # USB serial of RTL-SDR to open.  Run `rtl_test`
  #                              # or `lsusb -v` to find it.  Omit to use the
  #                              # first RTL-SDR found (fine for single-dongle).
  # Frequencies are taken from sync_signal.primary_station and target_channels below.

  # Block sizes: set samples_per_block for symmetric mode (same size on both
  # channels), or also set target_samples_per_block for asymmetric mode.
  # The USB callback buffer = gcd(sync_block, target_block) x 2 bytes, so both
  # block sizes must be multiples of 256 samples (= 512 bytes, one USB packet).
  #
  # Asymmetric example: sync=116736 (~57 ms) + target=233472 (~114 ms) gives
  # ~50% useful target duty cycle (33% wall time), at the cost of fewer
  # sync events per second (still sufficient for pilot correlation).
  samples_per_block: 116736                 # sync block: ~57 ms at 2.048 MSPS
  # target_samples_per_block: 116736        # target block (omit = same as sync)

  settling_samples: 58368                   # Discard first ~28.5 ms per block
                                            # Measured on R820T/2: target->sync hop
                                            # needs 19 ms raw + 1.5x safety = 28.5 ms
                                            # (sync->target is faster: 16 ms raw).
                                            # Run measure_settling.py to recalibrate.
  sample_rate_hz: 2048000
  gain_db: 40
  # pipeline_offset_ns: 0                  # Sequential inter-block structural delay.
  #                                        # Calibrate via colocated_pair_test.py --db
  #                                        # against an RSPduo or single_sdr reference.
  #                                        # Typically +20_000_000 to +40_000_000 ns.

# --- rspduo mode (uncomment to use) ---
# sdr_mode: "rspduo"
# rspduo:
#   # Frequencies are taken from sync_signal.primary_station and target_channels below.
#   sample_rate_hz: 2000000           # Max 2 MHz in dual-tuner mode
#   sync_gain_db: "auto"              # AGC for sync channel
#   target_gain_db: "auto"            # AGC for target channel
#   master_device_args: "driver=sdrplay"     # Add ",serial=XXXX" for specific unit
#   slave_device_args: null           # null = same as master_device_args
#   buffer_size: 65536                # IQ samples per read (~33 ms at 2 MSPS)
#   pipeline_offset_ns: 0             # Calibrate empirically; start at 0
#                                     # (RSPduo ADC TDM offset ~= 250 ns at 2 MSPS)

# --- two_sdr mode (uncomment to use) ---
# sdr_mode: "two_sdr"
# pps_injection: true   # GPS 1PPS wired to both SDR inputs via 10 MOhm resistors
# sync_sdr:
#   device_args: "driver=rtlsdr,serial=00000001"
#   sample_rate_hz: 2048000
#   center_frequency_hz: 99900000
#   gain_db: 30
# target_sdr:
#   device_args: "driver=rtlsdr,serial=00000002"
#   sample_rate_hz: 2048000
#   center_frequency_hz: 440000000    # UHF LMR target
#   gain_db: 40

sync_signal:
  type: "fm_pilot"
  primary_station:
    station_id: "KUOW_94.9"
    frequency_hz: 94900000
    latitude_deg: 47.61576     # FCC-documented
    longitude_deg: -122.30919
  secondary_station:           # Used for passive calibration cross-check
    station_id: "KISW_99.9"
    frequency_hz: 99900000
    latitude_deg: 47.6253      # FCC-documented transmitter location
    longitude_deg: -122.3563
  sync_period_ms: 7.0          # Emit one SyncEvent every N ms.
                               # For freq_hop: must be < (samples_per_block - settling_samples)
                               # / sample_rate_hz * 1000.  With block=65536, settling=49152,
                               # rate=2048000 the usable window is 8 ms, so keep this <= 7 ms.
  min_corr_peak: 0.3           # Reject SyncEvents below this quality threshold.
                               # Lower to 0.2 if you see 'Dropping onset/offset: no sync
                               # within N samples' - RSPduo typically gives 0.30-0.45.
  max_sync_age_ms: 200.0       # Maximum age of a SyncEvent that can be paired with a
                               # carrier event.  Default 200 ms is ~28x sync_period at 7 ms.
                               # Increase if you still see 'Dropping' warnings after
                               # lowering min_corr_peak.

target_channels:
  - frequency_hz: 462562500
    label: "FRS_CH1"
  - frequency_hz: 462587500
    label: "FRS_CH2"

carrier:
  # Carrier detector tuning.  Defaults are shown; omit the block to use them.
  #
  # onset_db / offset_db: power levels (dBFS) for detection hysteresis.
  # Real LMR signals at the ADC are typically -40 to -60 dBFS.  Lower onset_db
  # (e.g. -50) if the node never detects a carrier; verify with the SDR software
  # first to see the actual signal level on your target frequency.
  #
  # min_release_windows: require this many consecutive below-threshold windows
  # before the carrier is declared gone.  At 62.5 kHz target rate, 1 window ~1 ms.
  # Increase to 4-8 if you see bursts of measurements (multiple onset/offset events
  # per transmission) spaced by ~1 ms - that pattern means the power is hovering
  # near the offset threshold and chattering.  8 windows ~8 ms hold time.
  # onset_db / offset_db below serve as initial values; when
  # auto_threshold_margins is true (the default) they are overridden at runtime
  # by noise_floor + {onset,offset}_margin_db once the noise-floor EMA has
  # warmed up.  Set auto_threshold_margins: false to use these as static
  # thresholds.
  onset_db: -30.0
  offset_db: -40.0
  auto_threshold_margins: true        # Track noise floor automatically.
  onset_margin_db: 12.0               # onset  = noise_floor + 12 dB
  offset_margin_db:  6.0              # offset = noise_floor +  6 dB (hysteresis)
  auto_threshold_update_interval_s: 2.0
  window_samples: 64       # 64 samples = 256 µs at 250 kHz target rate.
                           # Sets detection-window granularity.  Smaller gives
                           # finer detection timing but less per-window noise
                           # averaging.  Matches the production default.
  min_hold_windows: 1      # Onset: require N consecutive above-threshold windows
  min_release_windows: 1   # Offset: require N consecutive below-threshold windows
                           # Set to 4-8 to suppress mid-transmission chattering
  snippet_samples: 16384   # IQ samples captured per event.
                           # 16384 = ~65.5 ms at 250 kHz (~44 KB/event base64-encoded).
                           # Sized to include ~30 ms of plateau after the knee
                           # on onsets so the server can xcorr on modulation
                           # content (CTCSS tone, audio).  The wider snippet is
                           # necessary for coherent complex-IQ TDOA, which
                           # relies on modulation bandwidth to produce a sharp
                           # cross-correlation peak.
  snippet_post_windows: 140 # Post-event windows appended to each IQ snippet.
                           # When > 0, the event is held until N additional windows
                           # have been captured after the threshold crossing. The
                           # snippet then covers the full carrier rise/fall shape
                           # plus post-event modulation content.
                           # Each window ~ 0.26 ms at 250 kHz.
                           # The encoder centres the detection point in the snippet
                           # (snippet_samples // 2 post samples required), so this
                           # value must satisfy:
                           #   snippet_post_windows * window_samples >= snippet_samples // 2
                           # At 64-sample windows and 16384-sample snippets the
                           # minimum is 128; 140 leaves a small safety margin.
                           # 0 = disabled (emit immediately; knee landing near snippet
                           # end, edge effects degrade knee finder).
  plateau_event_interval_s: 0.0   # Periodic-snapshot interval (seconds) while the
                                  # carrier is sustained.  0 = disabled (default,
                                  # only onset/offset events emitted).
                                  # When > 0, the detector emits a CarrierPlateau
                                  # every N seconds during active state, giving
                                  # the server many additional pair-TDOA samples
                                  # per transmission for averaging.  Recommended:
                                  # 1.0-2.0 s for typical PTT-radio transmissions
                                  # of 5-30 s duration.
                                  # The FIRST plateau in each active period fires
                                  # as soon as the IQ ring clears the onset edge
                                  # (snippet_duration ms after onset, e.g. ~65 ms
                                  # at 16384 samples / 250 kHz), guaranteeing at
                                  # least one plateau even for transmissions much
                                  # shorter than the configured interval.  All
                                  # SUBSEQUENT plateaus phase-lock to the wall-
                                  # clock interval grid (floor(now/interval)*
                                  # interval), so cross-node snippets overlap to
                                  # within NTP precision (~10 ms) for PHAT.
  plateau_max_per_active: 30      # Safety cap: max plateau emissions during a
                                  # single active period before muting until the
                                  # next idle->active cycle (offset+onset).
                                  # At plateau_event_interval_s=1.0, 30 = 30 s of
                                  # continuous plateaus -- well above 95th-percentile
                                  # voice key-down length, but bounded so a "stuck
                                  # active" state machine cannot exhaust journal
                                  # disk on resource-constrained hosts.  A WARN logs
                                  # once when the cap trips.  0 = no cap (legacy).
  # ring_lookback_windows: null  # Depth of the IQ ring buffer in detector windows.
                                  # Auto-sized (default: 3 x snippet_windows, or the
                                  # minimum needed to fill snippet_samples, whichever
                                  # is larger).  Set explicitly only if your transmitter
                                  # has fades longer than ~3 x snippet length.  If set
                                  # too small to fill the snippet, a warning is logged
                                  # at startup.  Use analyze_fade_timing.py to tune
                                  # after data collection.

reporter:
  server_url: "https://tdoa.example.com"
  auth_token: ""               # Or set TDOA_AUTH_TOKEN environment variable
  batch_size: 10
  flush_interval_ms: 500
  max_queue_size: 1000
  timeout_s: 10.0
  max_events_per_window: 5     # Local sliding-window rate limit on submit().
  events_rate_window_s: 5.0    # 5 events per 5s sliding window by default.
                               # Prevents a chattering detector from flooding
                               # the server.  Set max_events_per_window: 0 to
                               # disable (the server has its own, stricter
                               # per-node rate limit).

clock:
  source: "gps_1pps"           # gps_1pps | ntp | system
  calibration_offset_ns: 0     # Measured buffer latency correction (see CALIBRATION.md)
